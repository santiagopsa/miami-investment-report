    return translations[currentLang][key] || translations['es'][key] || key;

function setLanguage(lang) {
    currentLang = lang;
    
    // Update all data-i18n elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = t(key);
    });
    
    // Update select option
    const selectZoneOption = document.querySelector('option[data-i18n="selectZone"]');
    if (selectZoneOption) {
        selectZoneOption.textContent = t('selectZone');
    }
    
    // Update language toggle buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
    
    // Re-render current zone if one is selected
    const zoneSelector = document.getElementById('zoneSelector');
    if (zoneSelector.value) {
        const event = new Event('change');
        zoneSelector.dispatchEvent(event);
    }

// ===== UTILITY FUNCTIONS =====
function fmt(num) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0 }).format(num);
}

function hbar(label, val, max) {
    const pct = (val / max) * 100;
    return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-bg"><div class="bar-fill" style="width: ${pct}%;">${fmt(val)}</div></div></div>`;
}

function calcMonthlyPmt(principal, annualRate, years) {
    const monthlyRate = annualRate / 12;
    const numPayments = years * 12;
    if (monthlyRate === 0) return principal / numPayments;
    return (principal * monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
}

function getWalkScoreColor(score) {
    if (score >= 90) return '#4ade80';
    if (score >= 70) return '#a3e635';
    if (score >= 50) return '#fbbf24';
    if (score >= 25) return '#f97316';
    return '#ef4444';
}

function getCrimeColor(grade) {
    switch(grade) {
        case 'A': return '#4ade80';
        case 'B': return '#a3e635';
        case 'C': return '#fbbf24';
        case 'D': return '#f97316';
        case 'F': return '#ef4444';
        default: return '#b0b0b0';
    }
}

function renderValorizacion(zone, enhanced) {

    </div>`;
    
    html += `<h3 style="margin: 2rem 0 1rem; color: #fff;">${t('rentByBedroom')}</h3>`;
    if (enhanced.rents) {
        const maxRent = Math.max(...Object.values(enhanced.rents));
        html += hbar('Studio', enhanced.rents.studio || 0, maxRent);
        html += hbar('1 BR', enhanced.rents.br1 || 0, maxRent);
        html += hbar('2 BR', enhanced.rents.br2 || 0, maxRent);
        html += hbar('3 BR', enhanced.rents.br3 || 0, maxRent);

    html += `<h3 style="margin: 2rem 0 1rem; color: #fff;">${t('priceRange')}</h3>

    if (enhanced.rentTrend) {

        <div class="bar-chart">`;
        const years = ['2021', '2022', '2023', '2024', '2025'];

        years.forEach((year, i) => {

function renderInversion(zone) {
    const unitPrice = ((zone.priceMin + zone.priceMax) / 2) * 1000;
    const downPayment = unitPrice * 0.25;
    const loanAmount = unitPrice - downPayment;
    const interestRate = 0.065;
    const loanTerm = 25;
    
    const monthlyPayment = calcMonthlyPmt(loanAmount, interestRate, loanTerm);
    const annualDebtService = monthlyPayment * 12;
    
    const monthlyRent = zone.rentAvg;
    const monthlyOpEx = zone.opex / 12;
    const noi = (monthlyRent - monthlyOpEx) * 10;
    const cfbt = (noi * 12 - annualDebtService);
    const cashOnCash = (cfbt / downPayment) * 100;
    const capRate = (noi * 12 / unitPrice) * 100;
    
    let html = `<div class="investment-grid">
        <div class="assumptions-box">
            <h4>${t('assumptions')}</h4>
            <div class="assumption-row"><strong>${t('pricePerUnitLabel')}</strong> <span class="value">${fmt(unitPrice)}</span></div>
            <div class="assumption-row"><strong>${t('downPayment')}</strong> <span class="value">${fmt(downPayment)}</span></div>
            <div class="assumption-row"><strong>${t('loanAmount')}</strong> <span class="value">${fmt(loanAmount)}</span></div>
            <div class="assumption-row"><strong>${t('interestRate')}</strong> <span class="value">${(interestRate * 100).toFixed(2)}%</span></div>
            <div class="assumption-row"><strong>${t('term')}</strong> <span class="value">${loanTerm} ${t('year') === 'Año' ? 'años' : 'years'}</span></div>
            <div class="assumption-row"><strong>${t('monthlyPayment')}</strong> <span class="value">${fmt(monthlyPayment)}</span></div>
        </div>
        
        <div class="assumptions-box">
            <h4>${t('yearOneStatement')}</h4>
            <div class="assumption-row"><strong>${t('rentalIncome')}:</strong> <span class="value">${fmt(monthlyRent * 12 * 10)}</span></div>
            <div class="assumption-row"><strong>${t('annualOpEx')}:</strong> <span class="value">-${fmt(zone.opex * 10)}</span></div>
            <div class="assumption-row"><strong>${t('noi')}:</strong> <span class="value">${fmt(noi * 12)}</span></div>
            <div class="assumption-row"><strong>${t('debtService')}:</strong> <span class="value">-${fmt(annualDebtService * 10)}</span></div>
            <div class="assumption-row" style="border-top: 2px solid #ff6b35; padding-top: 0.8rem; margin-top: 0.8rem;"><strong>${t('cfbt')}:</strong> <span class="value">${fmt(cfbt * 10)}</span></div>
        </div>
    </div>`;
    
    html += `<div class="stat-grid">
        <div class="stat-card"><strong>${t('cashOnCash')}</strong><div class="value">${cashOnCash.toFixed(1)}%</div></div>
        <div class="stat-card"><strong>${t('capRate')}</strong><div class="value">${capRate.toFixed(2)}%</div></div>
    </div>`;
    
    html += `<h3 style="margin: 2rem 0 1rem; color: #fff;">${t('equityProjection')}</h3>
    <div class="table-responsive"><table>
        <thead><tr><th>${t('year')}</th><th>${t('pricePerUnitCol')}</th><th>${t('appreciationYear')}</th><th>${t('equityBuilding')}</th><th>${t('totalValue')}</th></tr></thead>
        <tbody>`;
    
    for (let y = 1; y <= 5; y++) {
        const aprec = zone.aprec5yr / 5;
        const yearPrice = unitPrice * (1 + aprec / 100) ** y;
        const yearDebtPaydown = (monthlyPayment - (loanAmount * (interestRate / 12))) * 12 * y;
        const totalEquity = (downPayment + yearDebtPaydown + (yearPrice - unitPrice) * 10);
        html += `<tr>
            <td>${t('year')} ${y}</td>
            <td>${fmt(yearPrice)}</td>
            <td>${fmt((yearPrice - unitPrice) * 10)}</td>
            <td>${fmt(yearDebtPaydown * 10)}</td>
            <td>${fmt(totalEquity)}</td>
        </tr>`;
    }
    
    html += `</tbody></table></div>`;
    
    return html;
}
